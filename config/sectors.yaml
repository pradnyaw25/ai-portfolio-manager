# `sector` (metadata-filtered retrieval, and later sector-concentration limits in
# Risk Engine V2 / P5-2). Keep in sync with config/watchlist.yaml. ETFs and the
# volatility index have no issuer sector and are intentionally omitted (they map
# to the default "Unknown").
