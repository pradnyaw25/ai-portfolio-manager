<html lang="en" data-theme="dark">
<head>
  <title>Decision Journal — Glasshouse Fund</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script>
    // Apply the saved theme before first paint to avoid a flash of the wrong theme on navigation.
    (function () {
      try {
        var stored = localStorage.getItem("ai-portfolio-theme");
        var theme = (stored === "light" || stored === "dark")
          ? stored
          : (window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
        document.documentElement.setAttribute("data-theme", theme);
      } catch (e) {}
    })();
  </script>

  <style>
    :root {
      color-scheme: light dark;
      --bg: #e9ecdf; --surface: #f3f5ec; --surface-subtle: #e1e5d4;
      --border: #cdd4bd; --border-strong: #b4bd9f;
      --text: #191c11; --muted: #5e6851; --muted-strong: #3f4834;
      --positive: #4d6a2c; --positive-bg: #dde7ca;
      --negative: #9c3a30; --negative-bg: #f0dbd6;
      --warning: #8a6a1c; --warning-bg: #efe6c9;
      --accent: #5f6b45; --accent-bg: #dfe5cf;
      --ink: #12140d; --shadow: 0 12px 34px rgba(18,20,13,0.10);
      --row-border: #dde2d0; --panel-subtle: #eef1e6; --bar-track: #dbe0cd;
      --tooltip-bg: #12140d; --tooltip-text: #eef1e6;
      --chart-grid: #d3d9c4; --chart-axis: #5e6851;
      --chart-ai: #2e7d32; --chart-ai-fill: rgba(46, 125, 50, 0.16);
      --chart-spy: #1f6feb; --chart-spy-fill: rgba(31, 111, 235, 0.08);
      --chart-qqq: #d97706; --chart-qqq-fill: rgba(217, 119, 6, 0.08);
      --chart-border: #f3f5ec;
    }

    :root[data-theme="dark"] {
      --bg: #12140d; --surface: #1b1e14; --surface-subtle: #24281a;
      --border: #343a28; --border-strong: #4a5138;
      --text: #e4e8d5; --muted: #99a487; --muted-strong: #c3ccb1;
      --positive: #a6c07f; --positive-bg: #1b2712;
      --negative: #e59a90; --negative-bg: #2f1a16;
      --warning: #d9bd6f; --warning-bg: #2b2410;
      --accent: #aeba90; --accent-bg: #23291a;
      --ink: #f1f4e7; --shadow: 0 16px 42px rgba(0,0,0,0.40);
      --row-border: #2a2f1f; --panel-subtle: #15170f; --bar-track: #2c3120;
      --tooltip-bg: #f1f4e7; --tooltip-text: #14160e;
      --chart-grid: #2c3120; --chart-axis: #99a487;
      --chart-ai: #5ec46a; --chart-ai-fill: rgba(94, 196, 106, 0.16);
      --chart-spy: #6aa3ff; --chart-spy-fill: rgba(106, 163, 255, 0.12);
      --chart-qqq: #e0a53a; --chart-qqq-fill: rgba(224, 165, 58, 0.12);
      --chart-border: #1b1e14;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-width: 320px;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    a {
      color: inherit;
    }

    .app-shell {
      width: min(1080px, calc(100% - 32px));
      margin: 0 auto;
      padding: 22px 0 48px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      color: var(--ink);
      font-weight: 800;
      letter-spacing: 0;
    }

    .brand-mark { display: block; width: 30px; height: 30px; color: var(--ink); flex: none; }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .theme-toggle {
      display: flex;
      align-items: center;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      padding: 4px;
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .nav a {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 0 12px;
      border-radius: 6px;
      color: var(--muted-strong);
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      white-space: nowrap;
    }

    .nav a.active,
    .theme-toggle button.active {
      background: var(--ink);
      color: var(--bg);
    }

    .theme-toggle {
      gap: 3px;
    }

    .theme-toggle button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      border: 0;
      border-radius: 5px;
      background: transparent;
      color: var(--muted-strong);
      cursor: pointer;
    }

    .theme-toggle button:hover,
    .nav a:hover {
      color: var(--ink);
    }

    h1,
    h2,
    h3,
    p {
      margin-top: 0;
    }

    h1 {
      margin-bottom: 6px;
      color: var(--ink);
      font-size: clamp(30px, 5vw, 54px);
      line-height: 1;
      letter-spacing: 0;
    }

    .page-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 20px;
      align-items: end;
      margin-bottom: 22px;
    }

    .subtitle {
      max-width: 720px;
      margin-bottom: 0;
      color: var(--muted);
      font-size: 15px;
    }

    .card {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
      padding: 20px;
      margin-bottom: 16px;
    }

    .date-header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      color: var(--ink);
      font-size: 20px;
      font-weight: 850;
    }

    /* Links each day to its prerendered, indexable page under /decisions/. */
    .permalink {
      margin-left: auto;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
      white-space: nowrap;
    }

    .permalink:hover { color: var(--ink); text-decoration: underline; }

    .meta {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 16px;
    }

    h3 {
      margin: 16px 0 8px;
      color: var(--ink);
      font-size: 16px;
      line-height: 1.25;
    }

    .section {
      margin-bottom: 12px;
    }

    .trade {
      border: 1px solid var(--border);
      border-left: 4px solid var(--positive);
      padding: 10px 12px;
      margin-bottom: 8px;
      background: var(--positive-bg);
      border-radius: 8px;
    }

    .trade.rejected {
      border-left-color: var(--negative);
      background: var(--negative-bg);
    }

    .confidence {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 800;
    }

    .conf-high { background: var(--positive-bg); color: var(--positive); }
    .conf-med { background: var(--warning-bg); color: var(--warning); }
    .conf-low { background: var(--negative-bg); color: var(--negative); }

    .sources {
      font-size: 13px;
      color: var(--muted);
    }

    .tool-trace {
      font-size: 13px;
      color: var(--muted);
    }

    .tool-trace summary {
      cursor: pointer;
      user-select: none;
    }

    .tool-trace ul {
      margin: 6px 0 0;
      padding-left: 18px;
    }

    .tool-trace code {
      font-size: 12px;
    }

    .rt-label {
      margin-top: 12px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .memory-list a {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .sym-name {
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }

    .logo {
      flex: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: var(--surface-subtle);
      vertical-align: middle;
      margin-right: 6px;
    }

    .logo .glyph {
      width: 13px;
      height: 13px;
      background-color: var(--muted-strong);
      -webkit-mask-position: center;
      mask-position: center;
      -webkit-mask-repeat: no-repeat;
      mask-repeat: no-repeat;
      -webkit-mask-size: contain;
      mask-size: contain;
    }

    .logo.mono {
      background: var(--accent-bg);
      color: var(--accent);
      font-size: 9px;
      font-weight: 850;
      letter-spacing: 0.3px;
    }

    .cash-thesis {
      border: 1px solid var(--border);
      border-left: 4px solid var(--warning);
      padding: 10px 12px;
      background: var(--warning-bg);
      border-radius: 8px;
      font-style: italic;
    }

    .debate-role {
      border: 1px solid var(--border);
      border-left: 4px solid var(--accent);
      padding: 8px 12px;
      margin-bottom: 8px;
      background: var(--surface-subtle);
      border-radius: 8px;
    }

    .debate-role ul {
      margin: 6px 0 0;
      padding-left: 18px;
    }

    .outlook {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 999px;
      background: var(--accent-bg);
      color: var(--accent);
      font-size: 13px;
      font-weight: 850;
      letter-spacing: 0.04em;
    }

    .memory-list {
      margin: 8px 0 0;
      padding-left: 20px;
    }

    .memory-list li {
      margin-bottom: 4px;
    }

    .muted {
      color: var(--muted);
    }

    .updated-at {
      justify-self: end;
      color: var(--muted);
      font-size: 13px;
      text-align: right;
      white-space: nowrap;
    }

    @media (max-width: 920px) {
      .topbar,
      .topbar-actions,
      .page-header {
        align-items: stretch;
        grid-template-columns: 1fr;
      }

      .topbar,
      .topbar-actions {
        flex-direction: column;
      }

      .nav {
        width: 100%;
        overflow-x: auto;
      }

      .updated-at {
        justify-self: start;
        text-align: left;
        white-space: normal;
      }
    }

    @media (max-width: 700px) {
      .app-shell {
        width: min(100% - 24px, 1080px);
        padding-top: 14px;
      }

      .card {
        padding: 16px;
      }

      .theme-toggle button {
        width: 26px;
      }
    }
  </style>
</head>

          <button type="button" data-theme-option="dark" title="Use dark theme" aria-label="Use dark theme"><svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor" aria-hidden="true"><path d="M21 12.9A9 9 0 1 1 11.1 3a7 7 0 0 0 9.9 9.9z"/></svg></button>

    <header class="page-header">
      <div>
        <h1>Decision Journal</h1>
        <p class="subtitle">Full audit trail of AI portfolio decisions, trade reasoning, risk checks, memory sources, and cash justifications. Every day also has its own <a href="decisions/">permanent page</a>.</p>

  <script>
    const THEME_KEY = "ai-portfolio-theme";

    function getThemePreference() {
      const stored = localStorage.getItem(THEME_KEY);
      if (stored === "light" || stored === "dark") return stored;
      return window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
    }

    function applyTheme(preference = getThemePreference()) {
      document.documentElement.setAttribute("data-theme", preference);

      document.querySelectorAll("[data-theme-option]").forEach(button => {
        const active = button.dataset.themeOption === preference;
        button.classList.toggle("active", active);
        button.setAttribute("aria-pressed", String(active));
      });
    }

    function setupThemeToggle() {
      applyTheme();
      document.querySelectorAll("[data-theme-option]").forEach(button => {
        button.addEventListener("click", () => {
          localStorage.setItem(THEME_KEY, button.dataset.themeOption);
          applyTheme(button.dataset.themeOption);
        });
      });
    }

    const money = new Intl.NumberFormat("en-US", {
      style: "currency",
      currency: "USD",
      maximumFractionDigits: 0
    });

    const symbolNames = {
      AAPL: "Apple Inc.", MSFT: "Microsoft Corp.", GOOGL: "Alphabet Inc.",
      AMZN: "Amazon.com Inc.", META: "Meta Platforms Inc.", NVDA: "NVIDIA Corp.",
      AMD: "Advanced Micro Devices", AVGO: "Broadcom Inc.", TSLA: "Tesla Inc.",
      JPM: "JPMorgan Chase & Co.", V: "Visa Inc.", MA: "Mastercard Inc.",
      UNH: "UnitedHealth Group", JNJ: "Johnson & Johnson", WMT: "Walmart Inc.",
      PG: "Procter & Gamble", HD: "The Home Depot", XOM: "Exxon Mobil Corp.",
      CAT: "Caterpillar Inc.", SPY: "SPDR S&P 500 ETF", QQQ: "Invesco QQQ Trust",
    };

    // Symbols with a bundled brand logo in public/logos/. Others fall back to a monogram.
    const logoSymbols = new Set([
      "AAPL", "MSFT", "GOOGL", "AMZN", "META", "NVDA",
      "AMD", "AVGO", "TSLA", "V", "MA", "WMT",
      "JPM", "UNH", "JNJ",
    ]);

    function logoHtml(symbol) {
      if (logoSymbols.has(symbol)) {
        const url = `logos/${symbol}.svg`;
        return `<span class="logo" aria-hidden="true"><span class="glyph" style="-webkit-mask-image:url('${url}');mask-image:url('${url}')"></span></span>`;
      }
      return `<span class="logo mono" aria-hidden="true">${escapeHtml(symbol.slice(0, 2))}</span>`;
    }

    function confClass(c) {
      if (c >= 0.7) return "conf-high";
      if (c >= 0.5) return "conf-med";
      return "conf-low";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    const TOOL_LABELS = {
      get_price: ["price", "prices"],
      get_prices: ["price", "prices"],
      get_history: ["history lookup", "history lookups"],
      search_news: ["news search", "news searches"],
    };

    function toolArgLabel(tc) {
      try {
        const a = JSON.parse(tc.arguments || "{}");
        if (a.symbol) return a.symbol + (a.days ? `, ${a.days}d` : "");
        if (a.query) return `"${a.query}"`;
        return Object.values(a).join(", ");
      } catch (e) {
        return tc.arguments || "";
      }
    }

    function toolCallBreakdown(toolCalls) {
      const counts = {};
      toolCalls.forEach(tc => { const k = tc.name || "tool"; counts[k] = (counts[k] || 0) + 1; });
      return Object.entries(counts)
        .sort((a, b) => b[1] - a[1])
        .map(([name, n]) => { const l = TOOL_LABELS[name] || [name, name]; return `${n} ${n === 1 ? l[0] : l[1]}`; })
        .join(", ");
    }

    function toolCallItems(toolCalls) {
      return toolCalls.map(tc => {
        const ok = !tc.outcome || tc.outcome.ok !== false;  // only failures are flagged
        return `<li><code>${escapeHtml(tc.name)}(${escapeHtml(toolArgLabel(tc))})</code>${ok ? "" : " ✗"}</li>`;
      }).join("");
    }

    function memorySourceInfo(item) {
      // The useful fields live under item.metadata (the old render read item.metadata.source,
      // which doesn't exist — hence "Unknown source" for everything).
      const m = item.metadata || item;
      const nested = m.metadata || {};
      const symbol = (m.symbols && m.symbols[0]) || nested.ticker || "";
      const form = nested.form || "";              // "10-K", "8-K"
      const itemTitle = nested.item_title || "";    // "Business", "Risk Factors", "Earnings Release"
      const st = m.source_type || "";
      const date = m.date || nested.filing_date || "";
      const url = (typeof m.source_id === "string" && m.source_id.startsWith("http")) ? m.source_id : "";
      const type = m.type || m.memory_type || item.type || "";

      let label;
      if (form === "10-K" || st === "sec_10k") label = `${symbol} 10-K${itemTitle ? " · " + itemTitle : ""}`;
      else if (form === "8-K" || st === "earnings_8k") label = `${symbol} 8-K${itemTitle ? " · " + itemTitle : ""}`;
      else if (st === "reflection") label = "Reflection";
      else if (st === "daily_report") label = "Daily report";
      else if (st === "trade") label = `Past trade${symbol ? " · " + symbol : ""}`;
      else label = symbol || st || "Memory";
      return { label: label.trim(), url, date, type };
    }

    function dedupeMemory(memoryUsed) {
      // Collapse the many chunks of one filing/report into a single source row.
      const seen = new Set(), rows = [];
      (memoryUsed || []).forEach(item => {
        const info = memorySourceInfo(item);
        const key = info.url || (info.label + "|" + info.date);
        if (seen.has(key)) return;
        seen.add(key);
        rows.push(info);
      });
      return rows;
    }

    function memoryListItems(rows) {
      return rows.map(r => {
        const meta = [r.date, r.type].filter(Boolean).join(" · ");
        const label = r.url
          ? `<a href="${escapeHtml(r.url)}" target="_blank" rel="noopener">${escapeHtml(r.label)}</a>`
          : escapeHtml(r.label);
        return `<li>${label}${meta ? ` <span class="muted">${escapeHtml(meta)}</span>` : ""}</li>`;
      }).join("");
    }

    // One collapsed section per decision holding both the tool-call trace and the
    // (deduped, linked) memory sources — the "how it researched" plumbing, out of the
    // way of the decision itself but one click from the receipts.
    function renderResearchDetails(toolCalls, memoryUsed) {
      const sources = dedupeMemory(memoryUsed);
      if (!toolCalls.length && !sources.length) return "";
      const bits = [];
      if (toolCalls.length) bits.push(`${toolCalls.length} tool call${toolCalls.length === 1 ? "" : "s"}`);
      if (sources.length) bits.push(`${sources.length} memory source${sources.length === 1 ? "" : "s"}`);

      let inner = "";
      if (toolCalls.length) {
        inner += `<div class="rt-label muted">Tool calls — ${escapeHtml(toolCallBreakdown(toolCalls))}</div>`;
        inner += `<ul>${toolCallItems(toolCalls)}</ul>`;
      }
      if (sources.length) {
        inner += `<div class="rt-label muted">Memory the AI cited (SEC filings link out)</div>`;
        inner += `<ul class="memory-list">${memoryListItems(sources)}</ul>`;
      }
      return `<details class="tool-trace"><summary>${escapeHtml(bits.join(" · "))}</summary>${inner}</details>`;
    }

    function renderTrade(t, rejected) {
      const symbol = t.symbol || "???";
      const action = t.action || "???";
      const shares = t.shares || 0;
      const confidence = t.confidence || 0;
      const reason = t.reasoning || t.reason || "";
      const risks = t.risks || [];
      const sources = t.sources_used || [];
      const rejectReason = t.reason_rejected || t.reason || "";

      if (rejected) {
        return `
          <div class="trade rejected">
            ${logoHtml(symbol)}<strong>${escapeHtml(action)} ${escapeHtml(shares)} ${escapeHtml(symbol)}</strong> <span class="sym-name">${escapeHtml(symbolNames[symbol] || symbol)}</span>
            <span class="confidence conf-low">${(confidence * 100).toFixed(0)}%</span>
            <br /><span class="muted">Rejected: ${escapeHtml(rejectReason)}</span>
          </div>
        `;
      }

      let html = `
        <div class="trade">
          ${logoHtml(symbol)}<strong>${escapeHtml(action)} ${escapeHtml(shares)} ${escapeHtml(symbol)}</strong> <span class="sym-name">${escapeHtml(symbolNames[symbol] || symbol)}</span>
          <span class="confidence ${confClass(confidence)}">${(confidence * 100).toFixed(0)}%</span>
          <br />${escapeHtml(reason)}
      `;

      if (risks.length > 0) {
        html += `<br /><span class="muted">Risks: ${escapeHtml(risks.join(", "))}</span>`;
      }

      if (sources.length > 0) {
        html += `<br /><span class="sources">Sources: ${escapeHtml(sources.join(", "))}</span>`;
      }

      html += `</div>`;
      return html;
    }

    function renderExecutedTrade(t) {
      const total = Number(t.total || (t.shares || 0) * (t.price || 0));
      const action = t.action || "???";
      const symbol = t.symbol || "???";
      const shares = t.shares || 0;
      const price = Number(t.price || 0);
      const reasoning = t.reasoning || "";

      return `
        <div class="trade">
          ${logoHtml(symbol)}<strong>${escapeHtml(action)} ${escapeHtml(shares)} ${escapeHtml(symbol)}</strong> <span class="sym-name">${escapeHtml(symbolNames[symbol] || symbol)}</span>
          <span class="muted">@ ${money.format(price)} · ${money.format(total)}</span>
          ${reasoning ? `<br />${escapeHtml(reasoning)}` : ""}
        </div>
      `;
    }

    function formatUpdatedAt(value) {
      if (!value) return "Unknown";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleString(undefined, {
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "numeric",
        minute: "2-digit",
        timeZoneName: "short",
      });
    }

    async function loadUpdatedAt() {
      try {
        const res = await fetch("./site_meta.json");
        const meta = await res.json();
        document.getElementById("updated-at").textContent =
          `Updated at: ${formatUpdatedAt(meta.updated_at)}`;
      } catch (e) {
        document.getElementById("updated-at").textContent = "Updated at: Unknown";
      }
    }

    async function loadDecisions() {
      const res = await fetch("./decisions.jsonl");
      const text = await res.text();

      const entries = text.trim().split("\n")
        .filter(line => line.trim())
        .map(line => JSON.parse(line))
        .reverse()
        .slice(0, 10);

      const container = document.getElementById("entries");

      if (entries.length === 0) {
        container.textContent = "No decisions yet.";
        return;
      }

      container.innerHTML = entries.map(entry => {
        const decision = entry.raw_decision || {};
        const portfolio = entry.portfolio || {};
        const approved = entry.approved_trades || [];
        // HOLDs are no-ops, never real trades; older journal entries wrongly logged
        // low-confidence HOLDs as "rejected", so filter them out of the display.
        const rejected = (entry.rejected_trades || []).filter(
          t => String(t.action || "").toUpperCase() !== "HOLD"
        );
        const executed = entry.executed_trades || [];
        const rebalance = entry.rebalance_trades || [];
        const cashThesis = entry.cash_thesis || decision.cash_thesis || null;
        const outlook = decision.outlook || "UNKNOWN";
        const memoryUsed = entry.memory_used || [];

        let html = `<div class="card">`;
        html += `<div class="date-header">${escapeHtml(entry.date)} <span class="outlook">${escapeHtml(outlook)}</span>
          <a class="permalink" href="decisions/${escapeHtml(entry.date)}.html" title="Permanent page for this day">Permalink →</a></div>`;
        html += `<div class="meta">
          Portfolio: ${money.format(portfolio.total_value)} ·
          Cash: ${money.format(portfolio.cash)} (${(portfolio.cash_pct * 100).toFixed(1)}%) ·
          Positions: ${portfolio.positions}
        </div>`;

        if (decision.market_summary || decision.summary) {
          html += `<div class="section">
            <h3>Market Summary</h3>
            <p>${escapeHtml(decision.market_summary || decision.summary)}</p>
          </div>`;
        }

        if (decision.portfolio_assessment) {
          html += `<div class="section">
            <h3>Portfolio Assessment</h3>
            <p>${escapeHtml(decision.portfolio_assessment)}</p>
          </div>`;
        }

        if (decision.risk_assessment) {
          html += `<div class="section">
            <h3>Risk Assessment</h3>
            <p>${escapeHtml(decision.risk_assessment)}</p>
          </div>`;
        }

        const research = entry.research_brief || {};
        const toolCalls = research.tool_calls || [];
        if (research.brief || toolCalls.length || memoryUsed.length) {
          html += `<div class="section">
            <h3>Research</h3>
            ${research.brief ? `<p>${escapeHtml(research.brief)}</p>` : ""}
            ${renderResearchDetails(toolCalls, memoryUsed)}
          </div>`;
        }

        const debate = decision.debate || {};
        const debateRoles = ["bull", "bear", "risk"].filter(r => debate[r] && debate[r].thesis);
        if (debateRoles.length) {
          const label = { bull: "🐂 Bull", bear: "🐻 Bear", risk: "⚠️ Risk", bear_rebuttal: "🐻 Bear rebuttal" };
          if (debate.bear_rebuttal && debate.bear_rebuttal.thesis) debateRoles.push("bear_rebuttal");
          const spread = decision.conviction_spread != null
            ? ` <span class="muted" style="font-weight:600">· conviction spread ${(decision.conviction_spread * 100).toFixed(0)}%</span>`
            : "";
          html += `<div class="section"><h3>Analyst Debate${spread}</h3>`;
          html += debateRoles.map(role => {
            const t = debate[role];
            const points = (t.key_points || []).map(p => `<li>${escapeHtml(p)}</li>`).join("");
            const conv = t.conviction != null ? ` · conviction ${(t.conviction * 100).toFixed(0)}%` : "";
            return `<div class="debate-role">
              <strong>${label[role] || role}${conv}</strong>
              <p>${escapeHtml(t.thesis)}</p>
              ${points ? `<ul>${points}</ul>` : ""}
            </div>`;
          }).join("");
          if (decision.bear_case_response) {
            html += `<div class="debate-role">
              <strong>PM response to the bear case</strong>
              <p>${escapeHtml(decision.bear_case_response)}</p>
            </div>`;
          }
          html += `</div>`;
        }

        if (cashThesis) {
          html += `<div class="section">
            <h3>Cash Thesis</h3>
            <div class="cash-thesis">${escapeHtml(cashThesis)}</div>
          </div>`;
        }

        html += `<div class="section"><h3>Executed Trades</h3>`;
        if (executed.length > 0) {
          html += executed.map(renderExecutedTrade).join("");
        } else {
          html += `<p class="muted">No trades executed.</p>`;
        }
        html += `</div>`;

        if (approved.length > 0) {
          html += `<div class="section"><h3>Approved Trades</h3>`;
          html += approved.map(t => renderTrade(t, false)).join("");
          html += `</div>`;
        }

        if (rebalance.length > 0) {
          html += `<div class="section"><h3>Rebalance Trades</h3>`;
          html += rebalance.map(t => renderTrade(t, false)).join("");
          html += `</div>`;
        }

        if (rejected.length > 0) {
          html += `<div class="section"><h3>Rejected Trades</h3>`;
          html += rejected.map(t => renderTrade(t, true)).join("");
          html += `</div>`;
        }

        if (approved.length === 0 && rebalance.length === 0 && rejected.length === 0 && executed.length === 0) {
          html += `<p class="muted">No trades proposed.</p>`;
        }

        html += `</div>`;
        return html;
      }).join("");
    }

    setupThemeToggle();
    loadUpdatedAt();
    loadDecisions();
  </script>
</body>
</html>
