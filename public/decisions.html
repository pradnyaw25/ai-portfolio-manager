<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <title>Decision Journal — AI Portfolio Manager</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f6f7f9;
      --surface: #ffffff;
      --surface-subtle: #f0f3f7;
      --border: #d9dee7;
      --border-strong: #c6ceda;
      --text: #17202a;
      --muted: #637083;
      --muted-strong: #465365;
      --positive: #16784b;
      --positive-bg: #e8f5ee;
      --negative: #b8323b;
      --negative-bg: #fdeced;
      --warning: #946200;
      --warning-bg: #fff6dd;
      --accent: #2454a6;
      --accent-bg: #e9f0ff;
      --ink: #101820;
      --shadow: 0 12px 36px rgba(16, 24, 32, 0.08);
      --panel-subtle: #fbfcfe;
      --tooltip-bg: #101820;
      --tooltip-text: #ffffff;
    }

    :root[data-theme="dark"] {
      --bg: #0f141b;
      --surface: #171e28;
      --surface-subtle: #202938;
      --border: #2f3a49;
      --border-strong: #465365;
      --text: #dbe3ee;
      --muted: #97a4b5;
      --muted-strong: #bdc7d5;
      --positive: #5ed39a;
      --positive-bg: #10291f;
      --negative: #ff7a86;
      --negative-bg: #35171c;
      --warning: #f2c766;
      --warning-bg: #2d230f;
      --accent: #83aaff;
      --accent-bg: #172747;
      --ink: #f5f7fb;
      --shadow: 0 16px 42px rgba(0, 0, 0, 0.34);
      --panel-subtle: #131a24;
      --tooltip-bg: #f5f7fb;
      --tooltip-text: #111720;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-width: 320px;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    a {
      color: inherit;
    }

    .app-shell {
      width: min(1080px, calc(100% - 32px));
      margin: 0 auto;
      padding: 22px 0 48px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      color: var(--ink);
      font-weight: 800;
      letter-spacing: 0;
    }

    .brand-mark {
      display: grid;
      width: 34px;
      height: 34px;
      place-items: center;
      border: 1px solid var(--border-strong);
      border-radius: 8px;
      background: var(--surface);
      color: var(--accent);
      font-size: 18px;
      font-weight: 850;
      box-shadow: 0 4px 14px rgba(16, 24, 32, 0.06);
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .nav,
    .theme-toggle {
      display: flex;
      align-items: center;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      padding: 4px;
    }

    .nav {
      gap: 4px;
    }

    .nav a {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 0 12px;
      border-radius: 6px;
      color: var(--muted-strong);
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      white-space: nowrap;
    }

    .nav a.active,
    .theme-toggle button.active {
      background: var(--ink);
      color: var(--bg);
    }

    .theme-toggle {
      gap: 3px;
    }

    .theme-toggle button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--muted-strong);
      cursor: pointer;
      font: inherit;
      font-size: 15px;
      font-weight: 850;
    }

    .theme-toggle button:hover,
    .nav a:hover {
      color: var(--ink);
    }

    h1,
    h2,
    h3,
    p {
      margin-top: 0;
    }

    h1 {
      margin-bottom: 6px;
      color: var(--ink);
      font-size: clamp(30px, 5vw, 54px);
      line-height: 1;
      letter-spacing: 0;
    }

    .page-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 20px;
      align-items: end;
      margin-bottom: 22px;
    }

    .subtitle {
      max-width: 720px;
      margin-bottom: 0;
      color: var(--muted);
      font-size: 15px;
    }

    .card {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
      padding: 20px;
      margin-bottom: 16px;
    }

    .date-header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      color: var(--ink);
      font-size: 20px;
      font-weight: 850;
    }

    .meta {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 16px;
    }

    h3 {
      margin: 16px 0 8px;
      color: var(--ink);
      font-size: 16px;
      line-height: 1.25;
    }

    .section {
      margin-bottom: 12px;
    }

    .trade {
      border: 1px solid var(--border);
      border-left: 4px solid var(--positive);
      padding: 10px 12px;
      margin-bottom: 8px;
      background: var(--positive-bg);
      border-radius: 8px;
    }

    .trade.rejected {
      border-left-color: var(--negative);
      background: var(--negative-bg);
    }

    .confidence {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 800;
    }

    .conf-high { background: var(--positive-bg); color: var(--positive); }
    .conf-med { background: var(--warning-bg); color: var(--warning); }
    .conf-low { background: var(--negative-bg); color: var(--negative); }

    .sources {
      font-size: 13px;
      color: var(--muted);
    }

    .cash-thesis {
      border: 1px solid var(--border);
      border-left: 4px solid var(--warning);
      padding: 10px 12px;
      background: var(--warning-bg);
      border-radius: 8px;
      font-style: italic;
    }

    .debate-role {
      border: 1px solid var(--border);
      border-left: 4px solid var(--accent);
      padding: 8px 12px;
      margin-bottom: 8px;
      background: var(--surface-subtle);
      border-radius: 8px;
    }

    .debate-role ul {
      margin: 6px 0 0;
      padding-left: 18px;
    }

    .outlook {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 999px;
      background: var(--accent-bg);
      color: var(--accent);
      font-size: 13px;
      font-weight: 850;
      letter-spacing: 0.04em;
    }

    .memory-list {
      margin: 8px 0 0;
      padding-left: 20px;
    }

    .memory-list li {
      margin-bottom: 4px;
    }

    .muted {
      color: var(--muted);
    }

    .updated-at {
      justify-self: end;
      color: var(--muted);
      font-size: 13px;
      text-align: right;
      white-space: nowrap;
    }

    @media (max-width: 920px) {
      .topbar,
      .topbar-actions,
      .page-header {
        align-items: stretch;
        grid-template-columns: 1fr;
      }

      .topbar,
      .topbar-actions {
        flex-direction: column;
      }

      .nav {
        width: 100%;
        overflow-x: auto;
      }

      .updated-at {
        justify-self: start;
        text-align: left;
        white-space: normal;
      }
    }

    @media (max-width: 700px) {
      .app-shell {
        width: min(100% - 24px, 1080px);
        padding-top: 14px;
      }

      .card {
        padding: 16px;
      }

      .theme-toggle button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <div class="topbar">
      <div class="brand">
        <span class="brand-mark">A</span>
        <span>AI Portfolio Manager</span>
      </div>
      <div class="topbar-actions">
        <nav class="nav" aria-label="Dashboard navigation">
          <a href="index.html">Dashboard</a>
          <a class="active" href="decisions.html">Decision Journal</a>
          <a href="predictions.html">Prediction Accuracy</a>
        </nav>
        <div class="theme-toggle" aria-label="Theme preference">
          <button type="button" data-theme-option="light" title="Use light theme" aria-label="Use light theme">L</button>
          <button type="button" data-theme-option="dark" title="Use dark theme" aria-label="Use dark theme">D</button>
        </div>
      </div>
    </div>

    <header class="page-header">
      <div>
        <h1>Decision Journal</h1>
        <p class="subtitle">Full audit trail of AI portfolio decisions, trade reasoning, risk checks, memory sources, and cash justifications.</p>
      </div>
      <p class="updated-at" id="updated-at">Updated at: Loading...</p>
    </header>

    <div id="entries">Loading...</div>
  </main>

  <script>
    const THEME_KEY = "ai-portfolio-theme";

    function getThemePreference() {
      const stored = localStorage.getItem(THEME_KEY);
      return ["light", "dark"].includes(stored) ? stored : "dark";
    }

    function applyTheme(preference = getThemePreference()) {
      document.documentElement.setAttribute("data-theme", preference);

      document.querySelectorAll("[data-theme-option]").forEach(button => {
        const active = button.dataset.themeOption === preference;
        button.classList.toggle("active", active);
        button.setAttribute("aria-pressed", String(active));
      });
    }

    function setupThemeToggle() {
      applyTheme();
      document.querySelectorAll("[data-theme-option]").forEach(button => {
        button.addEventListener("click", () => {
          localStorage.setItem(THEME_KEY, button.dataset.themeOption);
          applyTheme(button.dataset.themeOption);
        });
      });
    }

    const money = new Intl.NumberFormat("en-US", {
      style: "currency",
      currency: "USD",
      maximumFractionDigits: 0
    });

    const symbolNames = {
      AAPL: "Apple Inc.", MSFT: "Microsoft Corp.", GOOGL: "Alphabet Inc.",
      AMZN: "Amazon.com Inc.", META: "Meta Platforms Inc.", NVDA: "NVIDIA Corp.",
      AMD: "Advanced Micro Devices", AVGO: "Broadcom Inc.", TSLA: "Tesla Inc.",
      JPM: "JPMorgan Chase & Co.", V: "Visa Inc.", MA: "Mastercard Inc.",
      UNH: "UnitedHealth Group", JNJ: "Johnson & Johnson", WMT: "Walmart Inc.",
      PG: "Procter & Gamble", HD: "The Home Depot", XOM: "Exxon Mobil Corp.",
      CAT: "Caterpillar Inc.", SPY: "SPDR S&P 500 ETF", QQQ: "Invesco QQQ Trust",
    };

    function confClass(c) {
      if (c >= 0.7) return "conf-high";
      if (c >= 0.5) return "conf-med";
      return "conf-low";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function renderTrade(t, rejected) {
      const symbol = t.symbol || "???";
      const action = t.action || "???";
      const shares = t.shares || 0;
      const confidence = t.confidence || 0;
      const reason = t.reasoning || t.reason || "";
      const risks = t.risks || [];
      const sources = t.sources_used || [];
      const rejectReason = t.reason_rejected || t.reason || "";

      if (rejected) {
        return `
          <div class="trade rejected">
            <strong>${escapeHtml(action)} ${escapeHtml(shares)} <span title="${escapeHtml(symbolNames[symbol] || symbol)}">${escapeHtml(symbol)}</span></strong>
            <span class="confidence conf-low">${(confidence * 100).toFixed(0)}%</span>
            <br /><span class="muted">Rejected: ${escapeHtml(rejectReason)}</span>
          </div>
        `;
      }

      let html = `
        <div class="trade">
          <strong>${escapeHtml(action)} ${escapeHtml(shares)} ${escapeHtml(symbol)}</strong>
          <span class="confidence ${confClass(confidence)}">${(confidence * 100).toFixed(0)}%</span>
          <br />${escapeHtml(reason)}
      `;

      if (risks.length > 0) {
        html += `<br /><span class="muted">Risks: ${escapeHtml(risks.join(", "))}</span>`;
      }

      if (sources.length > 0) {
        html += `<br /><span class="sources">Sources: ${escapeHtml(sources.join(", "))}</span>`;
      }

      html += `</div>`;
      return html;
    }

    function renderExecutedTrade(t) {
      const total = Number(t.total || (t.shares || 0) * (t.price || 0));
      const action = t.action || "???";
      const symbol = t.symbol || "???";
      const shares = t.shares || 0;
      const price = Number(t.price || 0);
      const reasoning = t.reasoning || "";

      return `
        <div class="trade">
          <strong>${escapeHtml(action)} ${escapeHtml(shares)} ${escapeHtml(symbol)}</strong>
          <span class="muted">@ ${money.format(price)} · ${money.format(total)}</span>
          ${reasoning ? `<br />${escapeHtml(reasoning)}` : ""}
        </div>
      `;
    }

    function renderMemorySources(memoryUsed) {
      const sources = memoryUsed
        .map(item => item.metadata || {})
        .map(meta => ({
          source: meta.source || "Unknown source",
          date: meta.date || "",
          type: meta.type || "",
        }));

      if (sources.length === 0) {
        return `<p class="muted">No memory sources used.</p>`;
      }

      return `
        <ul class="memory-list">
          ${sources.map(meta => `
            <li>
              ${escapeHtml(meta.source)}
              <span class="muted">${escapeHtml([meta.date, meta.type].filter(Boolean).join(" · "))}</span>
            </li>
          `).join("")}
        </ul>
      `;
    }

    function formatUpdatedAt(value) {
      if (!value) return "Unknown";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleString(undefined, {
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "numeric",
        minute: "2-digit",
        timeZoneName: "short",
      });
    }

    async function loadUpdatedAt() {
      try {
        const res = await fetch("./site_meta.json");
        const meta = await res.json();
        document.getElementById("updated-at").textContent =
          `Updated at: ${formatUpdatedAt(meta.updated_at)}`;
      } catch (e) {
        document.getElementById("updated-at").textContent = "Updated at: Unknown";
      }
    }

    async function loadDecisions() {
      const res = await fetch("./decisions.jsonl");
      const text = await res.text();

      const entries = text.trim().split("\n")
        .filter(line => line.trim())
        .map(line => JSON.parse(line))
        .reverse()
        .slice(0, 10);

      const container = document.getElementById("entries");

      if (entries.length === 0) {
        container.textContent = "No decisions yet.";
        return;
      }

      container.innerHTML = entries.map(entry => {
        const decision = entry.raw_decision || {};
        const portfolio = entry.portfolio || {};
        const approved = entry.approved_trades || [];
        const rejected = entry.rejected_trades || [];
        const executed = entry.executed_trades || [];
        const rebalance = entry.rebalance_trades || [];
        const cashThesis = entry.cash_thesis || decision.cash_thesis || null;
        const outlook = decision.outlook || "UNKNOWN";
        const memoryUsed = entry.memory_used || [];

        let html = `<div class="card">`;
        html += `<div class="date-header">${escapeHtml(entry.date)} <span class="outlook">${escapeHtml(outlook)}</span></div>`;
        html += `<div class="meta">
          Portfolio: ${money.format(portfolio.total_value)} ·
          Cash: ${money.format(portfolio.cash)} (${(portfolio.cash_pct * 100).toFixed(1)}%) ·
          Positions: ${portfolio.positions}
        </div>`;

        if (decision.market_summary || decision.summary) {
          html += `<div class="section">
            <h3>Market Summary</h3>
            <p>${escapeHtml(decision.market_summary || decision.summary)}</p>
          </div>`;
        }

        if (decision.portfolio_assessment) {
          html += `<div class="section">
            <h3>Portfolio Assessment</h3>
            <p>${escapeHtml(decision.portfolio_assessment)}</p>
          </div>`;
        }

        if (decision.risk_assessment) {
          html += `<div class="section">
            <h3>Risk Assessment</h3>
            <p>${escapeHtml(decision.risk_assessment)}</p>
          </div>`;
        }

        const debate = decision.debate || {};
        const debateRoles = ["bull", "bear", "risk"].filter(r => debate[r] && debate[r].thesis);
        if (debateRoles.length) {
          const label = { bull: "🐂 Bull", bear: "🐻 Bear", risk: "⚠️ Risk" };
          html += `<div class="section"><h3>Analyst Debate</h3>`;
          html += debateRoles.map(role => {
            const t = debate[role];
            const points = (t.key_points || []).map(p => `<li>${escapeHtml(p)}</li>`).join("");
            const conv = t.conviction != null ? ` · conviction ${(t.conviction * 100).toFixed(0)}%` : "";
            return `<div class="debate-role">
              <strong>${label[role] || role}${conv}</strong>
              <p>${escapeHtml(t.thesis)}</p>
              ${points ? `<ul>${points}</ul>` : ""}
            </div>`;
          }).join("");
          if (decision.bear_case_response) {
            html += `<div class="debate-role">
              <strong>PM response to the bear case</strong>
              <p>${escapeHtml(decision.bear_case_response)}</p>
            </div>`;
          }
          html += `</div>`;
        }

        if (cashThesis) {
          html += `<div class="section">
            <h3>Cash Thesis</h3>
            <div class="cash-thesis">${escapeHtml(cashThesis)}</div>
          </div>`;
        }

        html += `<div class="section"><h3>Executed Trades</h3>`;
        if (executed.length > 0) {
          html += executed.map(renderExecutedTrade).join("");
        } else {
          html += `<p class="muted">No trades executed.</p>`;
        }
        html += `</div>`;

        if (approved.length > 0) {
          html += `<div class="section"><h3>Approved Trades</h3>`;
          html += approved.map(t => renderTrade(t, false)).join("");
          html += `</div>`;
        }

        if (rebalance.length > 0) {
          html += `<div class="section"><h3>Rebalance Trades</h3>`;
          html += rebalance.map(t => renderTrade(t, false)).join("");
          html += `</div>`;
        }

        if (rejected.length > 0) {
          html += `<div class="section"><h3>Rejected Trades</h3>`;
          html += rejected.map(t => renderTrade(t, true)).join("");
          html += `</div>`;
        }

        html += `<div class="section"><h3>Memory Sources Used</h3>`;
        html += renderMemorySources(memoryUsed);
        html += `</div>`;

        if (approved.length === 0 && rebalance.length === 0 && rejected.length === 0 && executed.length === 0) {
          html += `<p class="muted">No trades proposed.</p>`;
        }

        html += `</div>`;
        return html;
      }).join("");
    }

    setupThemeToggle();
    loadUpdatedAt();
    loadDecisions();
  </script>
</body>
</html>
