<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Glasshouse">
  <!-- Self-contained icon: a dark tile keeps the mark legible on any browser tab
       background (light or dark), instead of relying on prefers-color-scheme, which
       browsers apply unreliably to favicons. -->
  <rect width="48" height="48" rx="10.5" fill="#12140d"/>
  <g transform="translate(24 24) scale(0.8) translate(-24 -24)"
     stroke="#e4e8d5" fill="none" stroke-linejoin="round" stroke-linecap="round">
    <!-- glasshouse outline -->
    <path d="M24 5 L43 21 L43 43 L5 43 L5 21 Z" stroke-width="2.6"/>
    <!-- eave where the roof meets the walls -->
    <path d="M5 21 L43 21" stroke-width="2.2"/>
    <!-- glass panes: gable ridge + mullion grid -->
    <path d="M24 5 L24 21" stroke-width="1.9"/>
    <path d="M16 21 L16 43 M32 21 L32 43" stroke-width="1.9"/>
    <path d="M5 32 L43 32" stroke-width="1.9"/>
  </g>
</svg>
