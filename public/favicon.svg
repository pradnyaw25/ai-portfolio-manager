<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Glasshouse">
  <style>svg{color:#12140d}@media (prefers-color-scheme:dark){svg{color:#e4e8d5}}</style>
  <g stroke="currentColor" stroke-linejoin="round" stroke-linecap="round">
    <!-- glasshouse outline -->
    <path d="M24 5 L43 21 L43 43 L5 43 L5 21 Z" stroke-width="2.4"/>
