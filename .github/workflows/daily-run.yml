name: Daily Portfolio Run

on:
  schedule:
    # Weekday hourly window broad enough to cover US market hours across DST.
    # scripts/market_hours_guard.py enforces 9:30am-4:00pm America/New_York.
    - cron: "7 13-21 * * 1-5"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Check market hours
        id: market-hours
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          python scripts/market_hours_guard.py

      - name: Install dependencies
        if: steps.market-hours.outputs.should_run == 'true'
        run: |
          pip install -U pip
          pip install -e .

      - name: Run portfolio manager
        if: steps.market-hours.outputs.should_run == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
        run: |
          python -m src.main

      - name: Commit updated public files
        if: steps.market-hours.outputs.should_run == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add -f public data reports

          git diff --staged --quiet || \
          git commit -m "Daily portfolio update"

      - name: Push changes
        if: steps.market-hours.outputs.should_run == 'true'
        run: |
          git push
