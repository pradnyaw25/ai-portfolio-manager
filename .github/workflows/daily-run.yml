name: Daily Portfolio Run

on:
  schedule:
    # Twice on weekdays, timed toward the market open and the close for engagement.
    # Cron is UTC (no DST), but the market-hours guard drops any run outside
    # 9:30am-4:00pm America/New_York AND aborts the whole run (tweet included). The
    # only times in-hours BOTH seasons are the intersection of daylight (13:30-20:00
    # UTC) and standard (14:30-21:00 UTC) hours = 14:30-20:00 UTC, so both runs live
    # there, as near open/close as that allows:
    #   14:47 UTC -> 10:47am ET (daylight) / 9:47am ET (standard, just after the open)
    #   19:47 UTC ->  3:47pm ET (daylight, just before the close) / 2:47pm ET (standard)
    # The :47 offset dodges the crowded top of the hour. Keep the morning run before
    # and the afternoon run after 17:00 UTC — RECEIPTS_MORNING_CUTOFF_HOUR_UTC uses
    # that boundary to post the receipts tweet on the morning run only.
    - cron: "47 14,19 * * 1-5"

  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  run:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Check market hours
        id: market-hours
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          python scripts/market_hours_guard.py

      - name: Install dependencies
        if: steps.market-hours.outputs.should_run == 'true'
        run: |
          pip install -U pip
          pip install -e .

      - name: Run portfolio manager
        if: steps.market-hours.outputs.should_run == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          POST_TWEET: "true"
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
        run: |
          python scripts/daily_run.py

      - name: Commit updated public files
        if: steps.market-hours.outputs.should_run == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add -f public data reports

          git diff --staged --quiet || \
          git commit -m "Daily portfolio update"

      - name: Push changes
        if: steps.market-hours.outputs.should_run == 'true'
        run: |
          git push

      - name: Setup Pages
        if: steps.market-hours.outputs.should_run == 'true'
        uses: actions/configure-pages@v5

      - name: Upload static site
        if: steps.market-hours.outputs.should_run == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        if: steps.market-hours.outputs.should_run == 'true'
        id: deployment
        uses: actions/deploy-pages@v5
