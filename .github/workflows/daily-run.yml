name: Daily Portfolio Run

on:
  schedule:
    # Twice on weekdays during regular US market hours.
    # 14:37 UTC is 9:37am ET in standard time and 10:37am ET in daylight time.
    # 19:37 UTC is 2:37pm ET in standard time and 3:37pm ET in daylight time.
    # scripts/market_hours_guard.py still enforces 9:30am-4:00pm America/New_York.
    - cron: "37 14,19 * * 1-5"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Check market hours
        id: market-hours
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          python scripts/market_hours_guard.py

      - name: Install dependencies
        if: steps.market-hours.outputs.should_run == 'true'
        run: |
          pip install -U pip
          pip install -e .

      - name: Run portfolio manager
        if: steps.market-hours.outputs.should_run == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          POST_TWEET: "true"
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
        run: |
          python -m src.main

      - name: Commit updated public files
        if: steps.market-hours.outputs.should_run == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add -f public data reports

          git diff --staged --quiet || \
          git commit -m "Daily portfolio update"

      - name: Push changes
        if: steps.market-hours.outputs.should_run == 'true'
        run: |
          git push
