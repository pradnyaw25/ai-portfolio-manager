name: Daily Portfolio Run

on:
  schedule:
    # Twice on weekdays. These times budget for GitHub's scheduler delay, which is the
    # binding constraint here — NOT the nominal clock time.
    #
    # Scheduled runs on this repo have started 59-101 minutes late, every single run,
    # with no exceptions. The market-hours guard aborts the WHOLE run (tweet, journal,
    # and site update included) outside 9:30am-4:00pm America/New_York, so a cron time
    # without room for that delay silently kills the run. An earlier attempt to post
    # "just before the close" (19:47 UTC = 3:47pm ET, 13 minutes of margin) meant every
    # afternoon run landed past 4:00pm and was skipped.
    #
    # So: pick times where the run lands in-hours whether it fires on time OR ~1.5h
    # late, in BOTH DST seasons (in-hours for both = 14:30-20:00 UTC).
    #   14:40 UTC -> fires 14:40-16:20 UTC = 9:40am-12:20pm ET. Always in hours.
    #   17:50 UTC -> fires 17:50-19:30 UTC = 1:50pm-3:30pm ET. Always in hours, and
    #                the usual delay puts it near the close, which was the intent.
    # Tolerates a delay up to ~2h before the afternoon run risks the close.
    #
    # Keep the morning run before and the afternoon run after 17:00 UTC even when
    # delayed — RECEIPTS_MORNING_CUTOFF_HOUR_UTC uses that boundary to post receipts on
    # the morning run and the spotlight on the afternoon one.
    - cron: "40 14 * * 1-5"
    - cron: "50 17 * * 1-5"

  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  run:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Check market hours
        id: market-hours
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          python scripts/market_hours_guard.py

      - name: Install dependencies
        if: steps.market-hours.outputs.should_run == 'true'
        run: |
          pip install -U pip
          pip install -e .

      - name: Run portfolio manager
        if: steps.market-hours.outputs.should_run == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          POST_TWEET: "true"
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
        run: |
          python scripts/daily_run.py

      - name: Commit updated public files
        if: steps.market-hours.outputs.should_run == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add -f public data reports

          git diff --staged --quiet || \
          git commit -m "Daily portfolio update"

      - name: Push changes
        if: steps.market-hours.outputs.should_run == 'true'
        run: |
          git push

      - name: Setup Pages
        if: steps.market-hours.outputs.should_run == 'true'
        uses: actions/configure-pages@v5

      - name: Upload static site
        if: steps.market-hours.outputs.should_run == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        if: steps.market-hours.outputs.should_run == 'true'
        id: deployment
        uses: actions/deploy-pages@v5
