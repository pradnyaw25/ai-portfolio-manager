name: Daily Portfolio Run

on:
  schedule:
    # Twice on weekdays during regular US market hours.
    # 15:17 UTC is 10:17am ET in standard time and 11:17am ET in daylight time.
    # 18:17 UTC is 1:17pm ET in standard time and 2:17pm ET in daylight time.
    # These avoid the crowded top of the hour and leave buffer for scheduler delays.
    # scripts/market_hours_guard.py still enforces 9:30am-4:00pm America/New_York.
    - cron: "17 15,18 * * 1-5"

  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  run:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Check market hours
        id: market-hours
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          python scripts/market_hours_guard.py

      - name: Install dependencies
        if: steps.market-hours.outputs.should_run == 'true'
        run: |
          pip install -U pip
          pip install -e .

      - name: Run portfolio manager
        if: steps.market-hours.outputs.should_run == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          POST_TWEET: "true"
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
        run: |
          python scripts/daily_run.py

      - name: Commit updated public files
        if: steps.market-hours.outputs.should_run == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add -f public data reports

          git diff --staged --quiet || \
          git commit -m "Daily portfolio update"

      - name: Push changes
        if: steps.market-hours.outputs.should_run == 'true'
        run: |
          git push

      - name: Setup Pages
        if: steps.market-hours.outputs.should_run == 'true'
        uses: actions/configure-pages@v5

      - name: Upload static site
        if: steps.market-hours.outputs.should_run == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        if: steps.market-hours.outputs.should_run == 'true'
        id: deployment
        uses: actions/deploy-pages@v5
